name: Deploy Angular to Production Root

on:
  push:
    branches:
      - master

jobs:
  web-deploy:
    name: 🚀 Build and Deploy to Live Root
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏗️ Build Angular Project
      # 🌟 CRITICAL FIX: Changed from /test/ to / because the app now lives at the root domain
      run: npm run build -- --base-href /

    - name: 📂 Sync files to cPanel public_html
      uses: SamKirkland/FTP-Deploy-Action@v4.3.3
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.LIVE_FTP_USERNAME }}   # 🌟 Updated
        password: ${{ secrets.LIVE_FTP_PASSWORD }}   # 🌟 Updated
        local-dir: ./dist/abroado-app/browser/
        # 🌟 CRITICAL CHECK: Read the note below regarding your server path
        server-dir: ./