<aside class="sidebar">

  <!-- Header -->
  <div class="sidebar-header">
    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    </svg>
    <h3>Filters</h3>
  </div>

  <!-- Country -->
  <div class="filter-group">
    <label>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Country
    </label>
    <select [value]="initialCountry" (change)="onFilterChange('country', $event)">
      <option value="">All Countries</option>
      <option value="Australia">Australia</option>
      <option value="UK">United Kingdom</option>
    </select>
  </div>

  <!-- University -->
  <div class="filter-group">
    <label>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      University
    </label>
    <select (change)="onFilterChange('university', $event)" class="select-scrollable">
      <option value="">All Universities</option>
      <option *ngFor="let uni of universities" [value]="uni">{{ uni }}</option>
    </select>
  </div>

  <!-- Degree Level -->
  <div class="filter-group">
    <label>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      Degree Level
    </label>
    <select (change)="onFilterChange('level', $event)">
      <option value="">All Levels</option>
      <option value="Bachelors">🎓 Bachelors</option>
      <option value="Masters">📚 Masters</option>
    </select>
  </div>

  <!-- Reset -->
  <button class="sidebar-reset" (click)="onReset()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
    Reset Filters
  </button>

</aside>
